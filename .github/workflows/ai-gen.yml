name: Gemini Agentic Coder
on:
  issues:
    types: [labeled]

jobs:
  coding:
    if: github.event.label.name == 'ai-gen'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python scripts/gemini_agent.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: code generated by Gemini Agent"
          title: "[AI] ${{ github.event.issue.title }}"
          body: "Auto-generated code based on Issue #${{ github.event.issue.number }}"
          branch: "ai-feature-${{ github.event.issue.number }}"

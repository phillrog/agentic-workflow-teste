name: Gemini Agentic Coder
on:
  issues:
    types: [labeled]

jobs:
  coding:
    if: github.event.label.name == 'ai-gen'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python scripts/gemini_agent.py

      - name: Attempt 1 - Build and Test
        id: build_1
        run: |
          dotnet restore
          dotnet build --no-restore > build_log_1.txt 2>&1
        continue-on-error: true

      - name: Agent Self-Correction (Retry 1)
        if: steps.build_1.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Exportamos o log para uma variável de ambiente que o Python lerá
          export BUILD_ERRORS=$(cat build_log_1.txt)
          python scripts/gemini_fixer.py
      
      - name: Attempt 2 - Build after Fix
        id: build_2
        if: steps.build_1.outcome == 'failure'
        run: |
          dotnet build > build_log_2.txt 2>&1
        continue-on-error: true

      - name: Final PR Creation
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: agentic code generation with self-correction"
          title: "[AI] ${{ github.event.issue.title }}"
          body: |
            ## Relatório do Agente
            - **Status Inicial:** ${{ steps.build_1.outcome == 'success' && '✅ Passou direto' || '❌ Falhou' }}
            - **Status Final:** ${{ steps.build_2.outcome == 'success' || steps.build_1.outcome == 'success' && '✅ Sucesso' || '⚠️ Erro persistente' }}
            
            Baseado na Issue #${{ github.event.issue.number }}
          branch: "ai-feature-${{ github.event.issue.number }}"
